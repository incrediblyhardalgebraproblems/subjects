<script>
    function launchStealthTab() {
        let rawUrl = document.getElementById('target-url').value.trim();
        if (!rawUrl) return;

        // Formats raw search terms into Google or fixes protocols
        if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
            if (rawUrl.includes('.') && !rawUrl.includes(' ')) {
                rawUrl = 'https://' + rawUrl;
            } else {
                rawUrl = 'https://google.com' + encodeURIComponent(rawUrl);
            }
        }

        // 1. Shifting to an open, ultra-stable network mirror
        const fallbackGateway = "https://googleusercontent.com"; 
        const finalDestination = fallbackGateway + encodeURIComponent(rawUrl);

        // 2. Open the clean blank window
        const cleanTab = window.open();
        if (!cleanTab) {
            alert('Pop-up blocked! Click the notification in the address bar to permit this page to open tabs.');
            return;
        }

        // 3. Cloak the tab identity
        cleanTab.document.title = "Google Drive";

        // 4. Inject a full-screen viewport structure
        const viewportFrame = cleanTab.document.createElement('iframe');
        viewportFrame.style.position = "fixed";
        viewportFrame.style.width = "100vw";
        viewportFrame.style.height = "100vh";
        viewportFrame.style.top = "0px";
        viewportFrame.style.left = "0px";
        viewportFrame.style.border = "none";
        viewportFrame.style.margin = "0px";
        viewportFrame.style.zIndex = "999999";
        viewportFrame.src = finalDestination;

        cleanTab.document.body.appendChild(viewportFrame);
        document.getElementById('target-url').value = '';
    }
</script>
